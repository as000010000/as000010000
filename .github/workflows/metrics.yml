name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Runs every hour
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: as000010000
          template: classic
          base: "" # This removes the default stats so ONLY stars show up
          plugin_stars: yes
          plugin_stars_limit: 4 # Show last 4 stars
