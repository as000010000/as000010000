name: Public Metrics
on:
  schedule:
    - cron: "0,20,40 * * * *" 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }} 
          user: as000010000
          filename: github-metrics.svg
          base: "" 
          plugin_stars: yes
          plugin_stars_limit: 3
          config_allow_authenticated_user_only: no
